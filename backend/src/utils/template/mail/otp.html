<html>

        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
      "

      <tr>

          <p>This code is valid for 5 minutes.</p>

          <p style="margin-top: 20px">– Team Parikrama</p>
        </td>
      </tr>
    </table>
